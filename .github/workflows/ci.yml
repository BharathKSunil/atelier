name: ci

on:
  push:
  pull_request:

jobs:
  test:
    strategy:
      fail-fast: false
      matrix:
        os: [ubuntu-latest, macos-14]
        python-version: ["3.11", "3.12"]
    runs-on: ${{ matrix.os }}
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: ${{ matrix.python-version }}
      - run: pip install -r requirements-dev.txt ruff
      - run: ruff check .
      - run: pytest -q
      - name: smoke-import server + create app
        run: python -c "import tempfile; from atelier.server import create_app; create_app(tempfile.mkdtemp())"
