[tools]
python = "3.12"

[env]
_.python.venv = { path = ".venv", create = true }
PYTORCH_ENABLE_MPS_FALLBACK = "1"   # unsupported MPS ops fall back to CPU instead of erroring

[tasks.test]
description = "Run pure-logic unit tests (no models)"
run = "pytest -q"

[tasks.index]
description = "Phase 1 — index photos (resumable)"
run = "python -m atelier.pipeline.index --photos {{arg(name='photos')}} --db faces.db"

[tasks.cluster]
description = "Phase 2 — cluster faces into persons"
run = "python -m atelier.pipeline.cluster --db faces.db"

[tasks.series]
description = "Phase 2b — group images into series/bursts"
run = "python -m atelier.pipeline.series --db faces.db"

[tasks.score]
description = "Phase 3 — score quality, pick best face + best print frame"
run = "python -m atelier.pipeline.score --db faces.db"

[tasks.serve]
description = "Phase 4 — web UI (reads $PORT, default 5050)"
run = "python -m atelier.server --projects-dir ~/.atelier"

[tasks.learn]
description = "Phase 5 (optional) — train the learned pick head from feedback + buckets"
run = "python -m atelier.pipeline.learn --db faces.db"
